# Netlify build config — auto-detected on import so you don't have to type it.
[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback: every route serves index.html so client-side routing works.
# (public/_redirects does the same; this keeps it explicit in one place.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
