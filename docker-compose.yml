services:
  marketplace:
    build:
      context: .
      args:
        # Vite bakes these into the bundle at build time (see Dockerfile).
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_GEMINI_API_KEY: ${VITE_GEMINI_API_KEY:-}
    container_name: marketplace
    restart: unless-stopped
    # Traefik on this VPS runs in host-network mode with the Docker provider, so it
    # discovers this container via the Docker API and routes to its bridge IP on the
    # labeled port (80, where nginx serves). Only the default compose network + these
    # labels are needed — same pattern as the other apps on the host.
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.marketplace.rule=Host(`${MARKETPLACE_DOMAIN}`)"
      - "traefik.http.routers.marketplace.entrypoints=websecure"
      - "traefik.http.routers.marketplace.tls.certresolver=letsencrypt"
      - "traefik.http.services.marketplace.loadbalancer.server.port=80"
    # --- Alternative without Traefik: expose the port directly and reach it at
    # http://<vps-ip>:8080  (comment out the labels block above). ---
    # ports:
    #   - "8080:80"
