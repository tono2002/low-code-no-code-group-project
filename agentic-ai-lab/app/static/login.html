<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Supply Chain Risk Console — Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
<style>
  body { background:#0a0e16; color:#e4e1ed; font-family:Inter,sans-serif; }
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400; }
</style>
</head>
<body class="min-h-screen grid place-items-center">
  <form method="post" action="/login" class="w-[min(92vw,380px)] bg-[#111827] border border-[#1f2a3a] rounded-2xl p-8 shadow-2xl">
    <span class="material-symbols-outlined text-[#c0c1ff] text-3xl">factory</span>
    <h1 class="text-lg font-semibold mt-2">Supply Chain Risk Console</h1>
    <p class="text-xs text-[#908fa0] font-mono uppercase tracking-widest mb-6">Agentic AI · Titan Manufacturing</p>
    <label for="password" class="block text-xs text-[#c7c4d7] mb-1.5">Password</label>
    <input id="password" name="password" type="password" autofocus autocomplete="current-password"
      class="w-full bg-[#0a0e16] border border-[#1f2a3a] rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-[#8083ff]" />
    <button type="submit" class="w-full mt-4 bg-[#8083ff] hover:brightness-110 text-[#07006c] font-bold text-sm rounded-lg py-2.5">Log in</button>
    <div class="text-[#ffb4ab] text-xs mt-3 min-h-[16px]"><!--ERROR--></div>
  </form>
</body>
</html>
