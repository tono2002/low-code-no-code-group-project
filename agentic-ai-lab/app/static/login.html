<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Supply Chain Risk Console — Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>body { background:#0a0e16; }</style>
</head>
<body class="text-slate-200 font-sans min-h-screen grid place-items-center">
  <form method="post" action="/login" class="w-[min(92vw,380px)] bg-[#111827] border border-[#1f2a3a] rounded-2xl p-8 shadow-2xl">
    <div class="text-2xl mb-1">🛰️</div>
    <h1 class="text-lg font-semibold">Supply Chain Risk Console</h1>
    <p class="text-xs text-slate-500 mb-6">Agentic AI · Titan Manufacturing</p>
    <label for="password" class="block text-xs text-slate-400 mb-1.5">Password</label>
    <input id="password" name="password" type="password" autofocus autocomplete="current-password"
      class="w-full bg-[#0a0e16] border border-[#1f2a3a] rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-indigo-500" />
    <button type="submit" class="w-full mt-4 bg-indigo-500 hover:brightness-110 text-white font-semibold text-sm rounded-lg py-2.5">Log in</button>
    <div class="text-red-400 text-xs mt-3 min-h-[16px]"><!--ERROR--></div>
  </form>
</body>
</html>
